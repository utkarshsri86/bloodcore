services:
  - type: web
    name: bloodcore
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        sync: false
      - key: DOCTOR_USER
        value: doctor
      - key: DOCTOR_PASS
        sync: false