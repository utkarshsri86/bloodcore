<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BloodCore — {% block title %}{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root {
  --red:       #e5181b;
  --red-dark:  #a50f11;
  --red-glow:  rgba(229,24,27,0.25);
  --bg:        #0a0a0c;
  --surface:   #111115;
  --surface2:  #18181e;
  --border:    rgba(255,255,255,0.07);
  --text:      #f0eef2;
  --muted:     #7a7880;
  --success:   #22c55e;
  --warn:      #f59e0b;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 28px 24px 24px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--red);
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 18px;
  box-shadow: 0 0 20px var(--red-glow);
}
.logo-text {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
}
.logo-text span { color: var(--red); }
.logo-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.sidebar-nav {
  padding: 20px 12px;
  flex: 1;
}
.nav-section-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 12px;
  margin: 16px 0 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  color: var(--muted);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
  margin-bottom: 2px;
  position: relative;
}
.nav-item:hover {
  background: var(--surface2);
  color: var(--text);
}
.nav-item.active {
  background: rgba(229,24,27,0.12);
  color: var(--red);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: var(--red);
  border-radius: 0 3px 3px 0;
}
.nav-item i { width: 18px; text-align: center; font-size: 15px; }

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
}
.sidebar-footer strong { color: var(--text); display: block; margin-bottom: 2px; }

/* ── Main ── */
.main {
  margin-left: 240px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  height: 64px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  background: rgba(10,10,12,0.8);
  backdrop-filter: blur(12px);
  position: sticky; top: 0;
  z-index: 50;
}
.topbar-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
}
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-badge {
  padding: 6px 14px;
  background: rgba(229,24,27,0.12);
  color: var(--red);
  border: 1px solid rgba(229,24,27,0.25);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}

.content { padding: 32px; flex: 1; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  transition: border-color 0.2s;
}
.card:hover { border-color: rgba(255,255,255,0.12); }

.card-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-title i { color: var(--red); }

/* ── Stat Cards ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.stat-card:hover { transform: translateY(-2px); border-color: rgba(229,24,27,0.3); }
.stat-card::after {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 80px; height: 80px;
  background: var(--red-glow);
  border-radius: 50%;
  filter: blur(20px);
}
.stat-label {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: 36px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-sub { font-size: 12px; color: var(--muted); }
.stat-icon {
  position: absolute;
  top: 20px; right: 20px;
  font-size: 28px;
  opacity: 0.15;
}

/* ── Blood Group Badges ── */
.bg-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.5px;
}
.bg-a-pos, .bg-a-neg   { background: rgba(239,68,68,0.15); color: #ef4444; }
.bg-b-pos, .bg-b-neg   { background: rgba(249,115,22,0.15); color: #f97316; }
.bg-ab-pos,.bg-ab-neg  { background: rgba(168,85,247,0.15); color: #a855f7; }
.bg-o-pos, .bg-o-neg   { background: rgba(34,197,94,0.15); color: #22c55e; }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
  text-align: left;
  padding: 12px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 14px 16px; }
tbody tr:last-child { border-bottom: none; }

/* ── Forms ── */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
}
.form-group input,
.form-group select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus,
.form-group select:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 3px var(--red-glow);
}
.form-group select option { background: var(--surface2); }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 22px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  text-decoration: none;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--red);
  color: white;
  box-shadow: 0 4px 15px var(--red-glow);
}
.btn-primary:hover {
  background: var(--red-dark);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px var(--red-glow);
}
.btn-ghost {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.btn-danger {
  background: rgba(239,68,68,0.1);
  color: #ef4444;
  border: 1px solid rgba(239,68,68,0.2);
}
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-success {
  background: rgba(34,197,94,0.1);
  color: var(--success);
  border: 1px solid rgba(34,197,94,0.2);
}
.btn-success:hover { background: rgba(34,197,94,0.2); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 7px; }

/* ── Status badges ── */
.status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
}
.status-pending  { background: rgba(245,158,11,0.15); color: var(--warn); }
.status-fulfilled{ background: rgba(34,197,94,0.15);  color: var(--success); }
.status-cancelled{ background: rgba(239,68,68,0.15);  color: #ef4444; }

/* ── Blood inventory bars ── */
.inv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
}
.inv-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  transition: all 0.2s;
}
.inv-card:hover { border-color: var(--red); transform: translateY(-2px); }
.inv-blood-group {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--red);
  margin-bottom: 6px;
}
.inv-units {
  font-size: 28px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  line-height: 1;
  margin-bottom: 2px;
}
.inv-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.inv-bar-wrap {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.inv-bar {
  height: 100%;
  background: var(--red);
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  place-items: center;
}
.modal-overlay.open { display: grid; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  width: 90%;
  max-width: 560px;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
}
.modal-close {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  display: grid; place-items: center;
  transition: all 0.2s;
}
.modal-close:hover { color: var(--text); }

/* ── Search bar ── */
.search-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.search-input-wrap {
  position: relative;
  flex: 1; min-width: 200px;
}
.search-input-wrap i {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
}
.search-input-wrap input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px 10px 40px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input-wrap input:focus { border-color: var(--red); }

/* ── Page header ── */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}
.page-header h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 28px;
}
.page-header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

/* ── Misc ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 3px; }

/* Fade-in animation */
.fade-in {
  animation: fadeIn 0.4s ease both;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">🩸</div>
      <div>
        <div class="logo-text">Blood<span>Core</span></div>
      </div>
    </div>
    <div class="logo-sub">Management System</div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
      <i class="fas fa-chart-pie"></i> Dashboard
    </a>
    <a href="/donors" class="nav-item {% if request.path == '/donors' %}active{% endif %}">
      <i class="fas fa-users"></i> Donors
    </a>
    <a href="/inventory" class="nav-item {% if request.path == '/inventory' %}active{% endif %}">
      <i class="fas fa-tint"></i> Blood Inventory
    </a>
    <a href="/requests" class="nav-item {% if '/requests' in request.path %}active{% endif %}">
      <i class="fas fa-hand-holding-medical"></i> Blood Requests
    </a>
  </nav>

  <div class="sidebar-footer">
    <strong>Gonda Blood Centre</strong>
    Powered by BloodCore v2.0
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">{% block topbar_title %}{% endblock %}</div>
    <div class="topbar-right">
      <span class="topbar-badge"><i class="fas fa-circle" style="font-size:8px; color:var(--success)"></i> System Online</span>
    </div>
  </div>

  <div class="content fade-in">
    {% block content %}{% endblock %}
  </div>
</div>

<script>
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target === m) m.classList.remove('open'); });
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
